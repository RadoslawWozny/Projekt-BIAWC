events {
    worker_connections 1024;
}

http {
    upstream user-service {
        server user-service:8000;
    }

    upstream products-service {
        server products-service:8000;
    }

    upstream cart-service {
        server cart-service:8000;
    }

    upstream orders-service {
        server orders-service:8000;
    }

    server {
        listen 80;

        location /api/users/ {
            proxy_pass http://user-service/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/products/ {
            proxy_pass http://products-service/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/cart/ {
            proxy_pass http://cart-service/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders/ {
            proxy_pass http://orders-service/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
