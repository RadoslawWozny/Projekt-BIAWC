name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Static Analysis (Lint/Typecheck/Format)
        run: npm run static-tests

      - name: Run Tests & Generate Coverage Report
        # Ten krok uruchamia testy i generuje raport pokrycia jednocześnie
        run: npm run test:coverage

      - name: Build Application
        run: npm run build