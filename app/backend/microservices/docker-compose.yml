version: '3.8'

services:
  # ==================== USER SERVICE ====================
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    env_file: .env
    container_name: user-service
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://user-redis:6379/0
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - user-redis
    volumes:
      - ./user-service/app:/app/app
      - ./shared:/app/shared:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-redis:
    image: redis:7-alpine
    container_name: user-redis
    ports:
      - "6379:6379"
    networks:
      - microservices-network

  # ==================== PRODUCTS SERVICE ====================
  products-service:
    build:
      context: ./products-service
      dockerfile: Dockerfile
    env_file: .env
    container_name: products-service
    ports:
      - "8002:8000"
    environment:
      - REDIS_URL=redis://products-redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - products-redis
      - elasticsearch
    volumes:
      - ./products-service/app:/app/app
      - ./shared:/app/shared:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  products-redis:
    image: redis:7-alpine
    container_name: products-redis
    ports:
      - "6380:6379"
    networks:
      - microservices-network

  # ==================== CART SERVICE ====================
  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    env_file: .env
    container_name: cart-service
    ports:
      - "8003:8000"
    environment:
      - REDIS_URL=redis://cart-redis:6379/0
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCTS_SERVICE_URL=http://products-service:8000
    depends_on:
      - cart-redis
      - user-service
      - products-service
    volumes:
      - ./cart-service/app:/app/app
      - ./shared:/app/shared:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cart-redis:
    image: redis:7-alpine
    container_name: cart-redis
    ports:
      - "6381:6379"
    networks:
      - microservices-network

  # ==================== ORDERS SERVICE ====================
  orders-service:
    build:
      context: ./orders-service
      dockerfile: Dockerfile
    env_file: .env
    container_name: orders-service
    ports:
      - "8004:8000"
    environment:
      - REDIS_URL=redis://orders-redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - USER_SERVICE_URL=http://user-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - PRODUCTS_SERVICE_URL=http://products-service:8000
    depends_on:
      - orders-redis
      - rabbitmq
      - user-service
      - cart-service
      - products-service
    volumes:
      - ./orders-service/app:/app/app
      - ./shared:/app/shared:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orders-redis:
    image: redis:7-alpine
    container_name: orders-redis
    ports:
      - "6382:6379"
    networks:
      - microservices-network

  # ==================== INFRASTRUCTURE ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - microservices-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - microservices-network

  # ==================== API GATEWAY (opcjonalnie) ====================
  nginx:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - products-service
      - cart-service
      - orders-service
    networks:
      - microservices-network

volumes:
  rabbitmq-data:
  elasticsearch-data:

networks:
  microservices-network:
    driver: bridge
